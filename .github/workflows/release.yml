name: Release

on:
  push:
    tags:
      - "*"

# 添加权限配置
permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check distribution
        run: npm run check-dist

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Generate Stable Release Notes
        if: ${{ !contains(github.ref_name, '-') }}
        run: node scripts/generate-release-notes.mjs "$GITHUB_REF_NAME" --output release-notes.md

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          # 检查是否为 alpha/beta 预发布版本
          prerelease_flag=""
          if [[ "$tag" =~ -(alpha|beta) ]] || [[ "$tag" =~ (alpha|beta)[0-9] ]]; then
            prerelease_flag="--prerelease"
            echo "Detected pre-release version: $tag"
          fi

          notes_args=(--generate-notes)
          if [[ -f release-notes.md ]]; then
            notes_args=(--notes-file release-notes.md)
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; skipping release creation."
            exit 0
          fi

          # 创建发布
          gh release create "$tag" \
            --title="Release $tag" \
            "${notes_args[@]}" \
            $prerelease_flag \
            main.js manifest.json styles.css
